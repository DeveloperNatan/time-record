services:
  timerecord:
    image: timerecord:dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timerecord
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__POSTGRESQLCONNSTR_AppDbConnectionString: ${DB_CONNECTION} 
      Jwt__PrivateKey: ${JWT_PRIVATE_KEY}
      Jwt__Issuer: "Timerecord"
      Jwt__Audience: "Timerecord"
